<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equipo</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
padding:40px;
text-align:center;
}

h1{
letter-spacing:5px;
margin-bottom:20px;
}

.logo{
width:150px;
height:150px;
border-radius:50%;
border:3px solid red;
object-fit:cover;
margin-bottom:30px;
}

.section{
margin-top:30px;
}

.back-btn{
margin-top:50px;
display:inline-block;
padding:12px 25px;
background:red;
border-radius:8px;
color:white;
text-decoration:none;
}
</style>
</head>

<body>

<h1 id="teamName"></h1>
<img id="teamLogo" class="logo">

<div class="section">
<h3>Dueño</h3>
<p id="teamOwner"></p>
</div>

<div class="section">
<h3>Pilotos</h3>
<div id="teamDrivers"></div>
</div>

<div class="section">
<h3>Mecánicos</h3>
<div id="teamMechanics"></div>
</div>

<a href="escuderias.html" class="back-btn">
⬅ REGRESAR A ESCUDERÍAS
</a>

<script>

const equipos={

mercedes:{
nombre:"Mercedes Petronas",
logo:"luther.jpg",
dueno:"Toto Wolff",
pilotos:[
"Luther Schdler",
"Alessandro Lora",
"Anthony DeSciglio",
"Nicolas Simeone"
],
mecanicos:[
"James Carter",
"Leo Martins",
"Oliver Nash"
]
},

valhalla:{
nombre:"Scuderia Valhalla",
logo:"mernius.jpg",
dueno:"Erik Lindstrom",
pilotos:[
"Leon Lindstrom",
"Kaarl Lindstrom",
"Nathan Brooks"
],
mecanicos:[
"Victor Kane",
"Adam Schultz"
]
},

blackwell:{
nombre:"Blackwell Racing Bulls",
logo:"Dave.jpg",
dueno:"Luke Blackwell Sr.",
pilotos:[
"Dave Blackwell",
"Luke Blackwell",
"Gretzky Sergeev",
"Arkady Reznikov"
],
mecanicos:[
"Marco Vidal",
"Shane Cooper"
]
},

skyline:{
nombre:"Skyline Racing",
logo:"luko.jpg",
dueno:"Takashi Yamato",
pilotos:[
"Luko Magno",
"Guillermo Zambada",
"Lorenzo Abruzzi",
"Yepez"
],
mecanicos:[
"Kenji Sato",
"Hiro Tanaka"
]
}

}

// Obtener parámetro URL
const params=new URLSearchParams(window.location.search)
const teamID=params.get("team")

if(equipos[teamID]){

const team=equipos[teamID]

document.getElementById("teamName").textContent=team.nombre
document.getElementById("teamLogo").src=team.logo
document.getElementById("teamOwner").textContent=team.dueno

document.getElementById("teamDrivers").innerHTML=
team.pilotos.map(p=>`<p>${p}</p>`).join("")

document.getElementById("teamMechanics").innerHTML=
team.mecanicos.map(m=>`<p>${m}</p>`).join("")

}

</script>

</body>
</html>
