<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escuderías 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
background:black;
color:white;
padding:60px 40px;
}

/* BOTÓN INICIO SUPERIOR */
.top-bar{
position:fixed;
top:25px;
right:40px;
z-index:2000;
}

.inicio-btn{
padding:10px 22px;
background:linear-gradient(45deg,#ff0000,#ff3c3c);
border-radius:8px;
color:white;
text-decoration:none;
letter-spacing:1px;
transition:.3s;
box-shadow:0 0 10px rgba(255,0,0,.4);
}

.inicio-btn:hover{
transform:scale(1.08);
box-shadow:
0 0 15px red,
0 0 30px rgba(255,0,0,.6);
}

/* TÍTULO */
h1{
text-align:center;
letter-spacing:8px;
margin-bottom:70px;
font-size:40px;
}

/* GRID */
.team-cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:40px;
}

/* TARJETAS */
.card{
background:rgba(255,255,255,.05);
border-radius:18px;
padding:40px 20px;
text-align:center;
cursor:pointer;
transition:.35s;
border:1px solid rgba(255,255,255,.1);
text-decoration:none;
color:white;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-10px) scale(1.05);
box-shadow:
0 0 20px rgba(255,0,0,.5),
0 0 40px rgba(255,0,0,.3);
}

.card img{
width:110px;
height:110px;
border-radius:50%;
border:3px solid red;
object-fit:cover;
margin-bottom:25px;
transition:.3s;
}

.card:hover img{
transform:scale(1.15);
box-shadow:
0 0 15px red,
0 0 30px rgba(255,0,0,.6);
}

.card h3{
font-size:18px;
letter-spacing:2px;
}

</style>
</head>

<body>

<!-- BOTÓN INICIO -->
<div class="top-bar">
  <a href="index.html" class="inicio-btn">INICIO</a>
</div>

<h1>ESCUDERÍAS 2026</h1>

<div class="team-cards">

<a href="mercedes.html" class="card">
<img src="luther.jpg">
<h3>Mercedes Petronas</h3>
</a>

<a href="valhalla.html" class="card">
<img src="mernius.jpg">
<h3>Scuderia Valhalla</h3>
</a>

<a href="blackwell.html" class="card">
<img src="Dave.jpg">
<h3>Blackwell Racing Bulls</h3>
</a>

<a href="skyline.html" class="card">
<img src="luko.jpg">
<h3>Skyline Racing</h3>
</a>

<a href="aether.html" class="card">
<img src="logo5.jpg">
<h3>Aether Motorsport</h3>
</a>

<a href="phoenix.html" class="card">
<img src="logo6.jpg">
<h3>Phoenix GP</h3>
</a>

<a href="titanium.html" class="card">
<img src="logo7.jpg">
<h3>Titanium Racing</h3>
</a>

</div>

</body>
</html>
