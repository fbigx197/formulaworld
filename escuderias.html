<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formula World GX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
background:black;
color:white;
overflow-x:hidden;
}

/* VIDEO FONDO */

.bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,.6),rgba(0,0,0,.95));
z-index:-2;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
padding:18px 50px;
background:rgba(0,0,0,.85);
backdrop-filter:blur(10px);
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:2px solid red;
z-index:1000;
}

.logo{
font-weight:800;
letter-spacing:3px;
}

.btn{
padding:10px 20px;
background:linear-gradient(45deg,#ff0000,#ff6a00);
border:none;
border-radius:8px;
color:white;
cursor:pointer;
font-family:'Orbitron';
}

/* HERO */

.hero{
height:40vh;
display:flex;
justify-content:center;
align-items:center;
}

.hero h1{
font-size:60px;
letter-spacing:8px;
}

/* CONTENEDOR */

.container{
width:90%;
margin:auto;
padding-bottom:120px;
}

.section-title{
margin:50px 0 30px;
font-size:26px;
border-left:5px solid red;
padding-left:15px;
}

/* TARJETAS ESCUDERIAS */

.team-cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:30px;
}

/* CARD */

.card{

position:relative;
height:260px;

background:rgba(255,255,255,.05);
border-radius:14px;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

cursor:pointer;

transition:.35s;

border:1px solid rgba(255,255,255,.05);

overflow:hidden;
}

.card:hover{

transform:translateY(-8px) scale(1.03);

background:rgba(255,255,255,.08);

box-shadow:0 0 25px rgba(255,0,0,.35);

}

/* brillo animado */

.card::before{

content:"";

position:absolute;

top:-50%;
left:-50%;

width:200%;
height:200%;

background:linear-gradient(120deg,transparent,rgba(255,0,0,.4),transparent);

transform:rotate(25deg);

opacity:0;

transition:.5s;

}

.card:hover::before{

opacity:1;

animation:shine 1.4s linear;

}

@keyframes shine{
0%{transform:translateX(-200%) rotate(25deg)}
100%{transform:translateX(200%) rotate(25deg)}
}

.card img{
width:85px;
height:85px;
border-radius:50%;
object-fit:cover;
margin-bottom:15px;
border:2px solid red;
}

.card h3{
font-size:18px;
text-align:center;
}

/* PANEL ESCUDERIA */

.team-panel{

position:fixed;

inset:0;

background:rgba(0,0,0,.95);

display:flex;

justify-content:center;

align-items:center;

z-index:9999;

opacity:0;

pointer-events:none;

transition:.4s;

}

.team-panel.active{
opacity:1;
pointer-events:auto;
}

/* PANEL CONTENIDO */

.panel-content{

width:700px;

max-width:90%;

background:rgba(255,255,255,.05);

border-radius:14px;

padding:40px;

text-align:center;

border:1px solid rgba(255,255,255,.1);

animation:panelAnim .4s ease;

}

@keyframes panelAnim{

from{
transform:scale(.8);
opacity:0;
}

to{
transform:scale(1);
opacity:1;
}

}

.panel-content img{

width:120px;
height:120px;

border-radius:50%;

border:3px solid red;

margin-bottom:20px;

object-fit:cover;

}

.panel-content h2{
margin-bottom:20px;
}

.panel-content h4{
color:red;
margin-top:20px;
margin-bottom:8px;
}

.panel-content p{
margin-bottom:5px;
}

/* BOTON CERRAR */

.close-btn{

margin-top:30px;

padding:10px 25px;

background:red;

border:none;

color:white;

font-family:'Orbitron';

cursor:pointer;

border-radius:8px;

}

/* BOTON MUSICA */

.music-toggle{

position:fixed;

bottom:20px;

left:20px;

padding:12px 18px;

border:none;

border-radius:10px;

background:rgba(0,0,0,.8);

color:white;

cursor:pointer;

z-index:2000;

}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
<source src="f1-video.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="navbar">
<div class="logo">FORMULA WORLD GX</div>
<button class="btn">INICIO</button>
</div>

<section class="hero">
<h1>ESCUDERÍAS 2026</h1>
</section>

<div class="container">

<div class="section-title">PADDOCK</div>

<div class="team-cards" id="teamCards"></div>

</div>

<!-- PANEL ESCUDERIA -->

<div class="team-panel" id="teamPanel">

<div class="panel-content">

<img id="panelLogo">

<h2 id="panelName"></h2>

<div id="panelInfo"></div>

<button class="close-btn" onclick="closePanel()">CERRAR</button>

</div>

</div>

<audio id="bgMusic" src="NFS.mp3" loop></audio>

<button class="music-toggle" onclick="toggleMusic()" id="musicBtn">
SONIDO OFF
</button>

<script>

/* ESCUDERIAS */

const escuderias=[

{
nombre:"Mercedes Petronas",
logo:"luther.jpg",
dueno:"Toto Wolff",
pilotos:[
"Luther Schdler",
"Alessandro Lora",
"Anthony DeSciglio",
"Nicolas Simeone"
],
mecanicos:[
"James Carter",
"Leo Martins",
"Oliver Nash"
]
},

{
nombre:"Scuderia Valhalla",
logo:"mernius.jpg",
dueno:"Erik Lindstrom",
pilotos:[
"Leon Lindstrom",
"Kaarl Lindstrom",
"Nathan Brooks"
],
mecanicos:[
"Victor Kane",
"Adam Schultz"
]
},

{
nombre:"Blackwell Racing Bulls",
logo:"Dave.jpg",
dueno:"Luke Blackwell Sr.",
pilotos:[
"Dave Blackwell",
"Luke Blackwell",
"Gretzky Sergeev",
"Arkady Reznikov"
],
mecanicos:[
"Marco Vidal",
"Shane Cooper"
]
},

{
nombre:"Skyline Racing",
logo:"luko.jpg",
dueno:"Takashi Yamato",
pilotos:[
"Luko Magno",
"Guillermo Zambada",
"Lorenzo Abruzzi",
"Yepez"
],
mecanicos:[
"Kenji Sato",
"Hiro Tanaka"
]
}

]

const container=document.getElementById("teamCards")

function renderTeams(){

container.innerHTML=""

escuderias.forEach((team,i)=>{

container.innerHTML+=`

<div class="card" onclick="openTeam(${i})">

<img src="${team.logo}">

<h3>${team.nombre}</h3>

</div>

`

})

}

renderTeams()

function openTeam(id){

const team=escuderias[id]

document.getElementById("panelLogo").src=team.logo
document.getElementById("panelName").textContent=team.nombre

let html=`

<h4>Dueño</h4>
<p>${team.dueno}</p>

<h4>Pilotos</h4>
${team.pilotos.map(p=>`<p>${p}</p>`).join("")}

<h4>Mecánicos</h4>
${team.mecanicos.map(m=>`<p>${m}</p>`).join("")}

`

document.getElementById("panelInfo").innerHTML=html

document.getElementById("teamPanel").classList.add("active")

}

function closePanel(){

document.getElementById("teamPanel").classList.remove("active")

}

/* MUSICA */

const music=document.getElementById("bgMusic")

music.volume=0.5
music.muted=true

function toggleMusic(){

if(music.muted){

music.muted=false
music.play()

document.getElementById("musicBtn").textContent="SONIDO ON"

}else{

music.muted=true

document.getElementById("musicBtn").textContent="SONIDO OFF"

}

}

</script>

</body>
</html>
