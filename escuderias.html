<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escuderías 2026</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
padding:40px;
}

h1{
text-align:center;
letter-spacing:6px;
margin-bottom:50px;
}

.team-cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:rgba(255,255,255,.05);
border-radius:16px;
padding:30px;
text-align:center;
cursor:pointer;
transition:.3s;
border:1px solid rgba(255,255,255,.1);
text-decoration:none;
color:white;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px red;
}

.card img{
width:100px;
height:100px;
border-radius:50%;
border:3px solid red;
object-fit:cover;
margin-bottom:20px;
}
</style>
</head>

<body>

<h1>ESCUDERÍAS 2026</h1>

<div class="team-cards">

<a href="mercedes.html" class="card">
<img src="luther.jpg">
<h3>Mercedes Petronas</h3>
</a>

<a href="valhalla.html" class="card">
<img src="mernius.jpg">
<h3>Scuderia Valhalla</h3>
</a>

<a href="blackwell.html" class="card">
<img src="Dave.jpg">
<h3>Blackwell Racing Bulls</h3>
</a>

<a href="skyline.html" class="card">
<img src="luko.jpg">
<h3>Skyline Racing</h3>
</a>

<a href="aether.html" class="card">
<img src="logo5.jpg">
<h3>Aether Motorsport</h3>
</a>

<a href="phoenix.html" class="card">
<img src="logo6.jpg">
<h3>Phoenix GP</h3>
</a>

<a href="titanium.html" class="card">
<img src="logo7.jpg">
<h3>Titanium Racing</h3>
</a>

</div>

</body>
</html>
