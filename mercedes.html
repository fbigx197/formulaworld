<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mercedes Petronas</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
    --team-color:#00d2be;
}

body{
    margin:0;
    font-family:'Orbitron', sans-serif;
    background:radial-gradient(circle at top,#111 0%,#000 60%);
    color:white;
}

/* HEADER */

.header{
    padding:80px 20px 60px 20px;
    text-align:center;
    background:linear-gradient(to bottom, #111, #000);
}

.header h1{
    font-size:42px;
    letter-spacing:4px;
    margin-bottom:40px;
    animation:fadeIn 1s ease forwards;
}

/* LOGO */

.logo-wrapper{
    display:flex;
    justify-content:center;
    margin-bottom:20px;
}

.logo-wrapper img{
    width:180px;
    height:180px;
    border-radius:50%;
    object-fit:cover;
    border:5px solid var(--team-color);
    box-shadow:0 0 40px var(--team-color);
    background:black;
}

/* CONTENIDO */

.container{
    max-width:1200px;
    margin:40px auto 60px auto;
    padding:20px;
}

.section-title{
    text-align:center;
    font-size:26px;
    margin:60px 0 30px 0;
    color:var(--team-color);
    position:relative;
}

.section-title::after{
    content:"";
    display:block;
    width:80px;
    height:3px;
    background:var(--team-color);
    margin:10px auto 0 auto;
}

/* TARJETAS */

.card-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:30px;
}

.card{
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(10px);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:20px;
    padding:30px 20px;
    text-align:center;
    transition:0.4s;
}

.card:hover{
    transform:translateY(-10px);
    box-shadow:0 0 25px var(--team-color);
    border-color:var(--team-color);
}

.card img{
    width:120px;
    height:120px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:15px;
    border:3px solid var(--team-color);
}

.card h3{
    margin:10px 0 5px 0;
}

.card p{
    font-size:14px;
    color:#aaa;
}

/* BOTÓN VOLVER */

.back-btn{
    position:fixed;
    bottom:30px;
    left:30px;
    background:var(--team-color);
    color:black;
    padding:14px 24px;
    border-radius:40px;
    text-decoration:none;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 0 15px var(--team-color);
}

.back-btn:hover{
    background:white;
}

/* ANIMACIÓN */

@keyframes fadeIn{
    from{opacity:0; transform:translateY(-20px);}
    to{opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<div class="header">
    <h1>Mercedes Petronas</h1>

    <div class="logo-wrapper">
        <img src="mercedes.jfif">
    </div>
</div>

<div class="container">

<!-- DUEÑO -->
<div class="section-title">Dueño</div>
<div class="card-grid">
    <div class="card">
        <img src="leoz.jpg">
        <h3>Leo Zannier</h3>
        <p>Director Ejecutivo</p>
    </div>
</div>

<!-- PILOTOS -->
<div class="section-title">Pilotos</div>
<div class="card-grid">
    <div class="card">
        <img src="luther.jpg">
        <h3>Luther Scholer</h3>
        <p>Piloto Oficial</p>
    </div>

    <div class="card">
        <img src="piloto2.jpg">
        <h3>Alessandro Lora</h3>
        <p>Piloto Oficial</p>
    </div>

    <div class="card">
        <img src="piloto3.jpg">
        <h3>Anthony DeSciglio</h3>
        <p>Piloto Oficial</p>
    </div>
</div>

<!-- MECÁNICOS -->
<div class="section-title">Mecánicos</div>
<div class="card-grid">
    <div class="card">
        <img src="mecanico1.jpg">
        <h3>Ingeniero 1</h3>
        <p>Ingeniero Principal</p>
    </div>

    <div class="card">
        <img src="mecanico2.jpg">
        <h3>Ingeniero 2</h3>
        <p>Telemetría</p>
    </div>
</div>

</div>

<a href="escuderias.html" class="back-btn">⬅ Volver</a>

</body>
</html>
