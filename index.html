<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formula World GX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Orbitron',sans-serif;
background:black;
color:white;
overflow:hidden;
}

/* VIDEO */

#video-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
filter:none;
transition:1s;
}

#video-bg.dark{
filter:brightness(0.35) contrast(1.2);
}

/* TITULO */

.header{
position:absolute;
top:20px;
width:100%;
text-align:center;
font-size:18px;
letter-spacing:6px;
opacity:.8;
}

/* BOTON MUSICA */

.music{
position:absolute;
bottom:40px;
left:40px;
background:black;
border:1px solid #333;
padding:10px 18px;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

/* BOTON INICIAR */

.start{
position:absolute;
bottom:40px;
right:40px;
background:red;
padding:14px 34px;
border-radius:12px;
font-weight:700;
cursor:pointer;
animation:blink 1s infinite;
}

@keyframes blink{
0%{box-shadow:0 0 5px red}
50%{box-shadow:0 0 25px red}
100%{box-shadow:0 0 5px red}
}

/* TEAM FIA */

.team{
position:absolute;
bottom:120px;
width:100%;
text-align:center;
font-family:'Rajdhani',sans-serif;
font-size:20px;
letter-spacing:2px;
}

.team span{
display:block;
opacity:0;
transform:translateY(-80px);
animation:drop 1s forwards;
}

.team span:nth-child(1){animation-delay:.3s}
.team span:nth-child(2){animation-delay:.7s}
.team span:nth-child(3){animation-delay:1.1s}

@keyframes drop{
to{
opacity:1;
transform:translateY(0);
}
}

/* SEMAFORO */

.lights{
position:absolute;
top:120px;
width:100%;
display:flex;
justify-content:center;
gap:15px;
}

.light{
width:22px;
height:22px;
border-radius:50%;
background:#111;
border:2px solid #333;
}

.light.red{background:red}
.light.green{background:#00ff6a}

/* TARJETAS */

.cards{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
gap:40px;
}

.card{
width:260px;
height:380px;
background:rgba(0,0,0,.7);
border:1px solid #444;
border-radius:16px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
}

</style>
</head>

<body>

<video id="video-bg" autoplay muted loop>
<source src="video.mp4" type="video/mp4">
</video>

<div class="header">FORMULA WORLD GX</div>

<div class="lights">

<div class="light" id="l1"></div>
<div class="light" id="l2"></div>
<div class="light" id="l3"></div>
<div class="light" id="l4"></div>
<div class="light" id="l5"></div>

</div>

<div class="team">

<span>Comisario FIA — Gennaro Foressi</span>
<span>Comisario FIA — Ethan Collins</span>
<span>SubComisario FIA — César Bustos</span>

</div>

<div class="music" onclick="musicToggle()" id="musicBtn">
MUSICA OFF
</div>

<div class="start" onclick="startRace()" id="startBtn">
INICIAR
</div>

<div class="cards" id="cards">

<div class="card">PILOTO 1</div>
<div class="card">PILOTO 2</div>
<div class="card">PILOTO 3</div>

</div>

<audio id="music" loop>
<source src="music.mp3">
</audio>

<script>

let music=false

function musicToggle(){

let m=document.getElementById("music")

if(!music){
m.play()
document.getElementById("musicBtn").innerText="MUSICA ON"
music=true
}else{
m.pause()
document.getElementById("musicBtn").innerText="MUSICA OFF"
music=false
}

}

/* SEMAFORO */

function startRace(){

document.getElementById("startBtn").style.display="none"

let lights=[
document.getElementById("l1"),
document.getElementById("l2"),
document.getElementById("l3"),
document.getElementById("l4"),
document.getElementById("l5")
]

let i=0

let red=setInterval(()=>{

lights[i].classList.add("red")
i++

if(i==5){

clearInterval(red)

setTimeout(()=>{

lights.forEach(l=>{
l.classList.remove("red")
l.classList.add("green")
})

go()

},800)

}

},700)

}

function go(){

document.getElementById("video-bg").classList.add("dark")

setTimeout(()=>{

document.getElementById("cards").style.display="flex"

},800)

}

</script>

</body>
</html>
