<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formula World GX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:#000;
color:white;
overflow-x:hidden;
}

/* VIDEO */

#intro{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:1;
}

#intro video{
width:100%;
height:100%;
object-fit:cover;
}

/* OSCURECER VIDEO */

#intro.dark video{
filter:brightness(35%);
transition:1s;
}

/* BOTON INICIAR */

#startBtn{

position:absolute;
bottom:40px;
right:40px;

padding:14px 30px;

background:#ff0000;
color:white;

border:none;

font-size:18px;
font-weight:800;

cursor:pointer;

border-radius:6px;

animation:blink 1s infinite;

z-index:3;
}

@keyframes blink{

0%{box-shadow:0 0 5px red;}
50%{box-shadow:0 0 25px red;}
100%{box-shadow:0 0 5px red;}

}

/* BOTON MUSICA */

#musicBtn{

position:absolute;
bottom:40px;
left:40px;

padding:10px 20px;

background:black;
color:white;

border:1px solid white;

cursor:pointer;

border-radius:8px;

z-index:3;
}

/* EQUIPOS */

#teams{

position:absolute;
bottom:20px;
width:100%;

text-align:center;

font-size:14px;
opacity:0.8;

z-index:3;
}

.team{
display:block;
animation:drop 1.5s ease forwards;
opacity:0;
}

.team:nth-child(1){animation-delay:0.2s}
.team:nth-child(2){animation-delay:0.4s}
.team:nth-child(3){animation-delay:0.6s}
.team:nth-child(4){animation-delay:0.8s}
.team:nth-child(5){animation-delay:1s}
.team:nth-child(6){animation-delay:1.2s}
.team:nth-child(7){animation-delay:1.4s}
.team:nth-child(8){animation-delay:1.6s}
.team:nth-child(9){animation-delay:1.8s}
.team:nth-child(10){animation-delay:2s}

@keyframes drop{

0%{
transform:translateY(-40px);
opacity:0;
}

100%{
transform:translateY(0);
opacity:1;
}

}

/* TARJETAS */

#cards{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

display:flex;
flex-wrap:wrap;

justify-content:center;
align-items:center;

gap:40px;

opacity:0;

transition:1s;

z-index:4;

max-width:90%;

}

.card{

width:200px;
height:300px;

background:#111;

border:1px solid red;

border-radius:14px;

display:flex;
align-items:center;
justify-content:center;

font-size:20px;

backdrop-filter:blur(5px);

transition:0.3s;

}

.card:hover{

transform:scale(1.05);
box-shadow:0 0 15px red;

}

/* RESPONSIVE MOVIL */

@media (max-width:768px){

#cards{
gap:20px;
}

.card{
width:160px;
height:240px;
font-size:16px;
}

#startBtn{
right:20px;
bottom:20px;
}

#musicBtn{
left:20px;
bottom:20px;
}

}

</style>
</head>

<body>

<div id="intro">

<video autoplay muted loop>
<source src="intro.mp4" type="video/mp4">
</video>

<button id="musicBtn">MUSICA OFF</button>

<button id="startBtn">INICIAR</button>

<div id="teams">

<span class="team">Mercedes AMG Petronas</span>
<span class="team">Red Bull Racing</span>
<span class="team">Ferrari</span>
<span class="team">McLaren</span>
<span class="team">Aston Martin</span>
<span class="team">Alpine</span>
<span class="team">Williams</span>
<span class="team">Kick Sauber</span>
<span class="team">RB Visa Cash App</span>
<span class="team">Haas F1 Team</span>

</div>

</div>

<div id="cards">

<div class="card">CAMPEONATOS</div>
<div class="card">PILOTOS</div>
<div class="card">PISTAS</div>
<div class="card">ESCUDERIAS</div>

</div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mp3">
</audio>

<script>

const startBtn=document.getElementById("startBtn")
const intro=document.getElementById("intro")
const cards=document.getElementById("cards")
const music=document.getElementById("music")
const musicBtn=document.getElementById("musicBtn")

let musicOn=false

musicBtn.onclick=()=>{

if(musicOn){

music.pause()
musicBtn.innerText="MUSICA OFF"

}else{

music.play()
musicBtn.innerText="MUSICA ON"

}

musicOn=!musicOn

}

startBtn.onclick=()=>{

intro.classList.add("dark")

cards.style.opacity="1"

startBtn.style.display="none"

}

</script>

</body>
</html>
