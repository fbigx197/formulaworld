<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formula World GX</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="formulalogo.png">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Orbitron',sans-serif;
}

body{
background:black;
color:white;
overflow:hidden;
}

/* VIDEO */

.bg-video{
position:fixed;
inset:0;
width:100%;
height:100%;
object-fit:cover;
z-index:-3;
}

/* OVERLAY */

.overlay{
position:fixed;
inset:0;
background:linear-gradient(to bottom,rgba(0,0,0,.6),rgba(0,0,0,.9));
opacity:0;
transition:1s;
z-index:-2;
}

.overlay.active{
opacity:1;
}

/* NAVBAR */

.navbar{
position:fixed;
top:0;
width:100%;
padding:18px;
display:flex;
justify-content:center;
background:rgba(0,0,0,.6);
backdrop-filter:blur(6px);
}

.logo{
font-size:22px;
letter-spacing:4px;
font-weight:800;
}

/* BOTONES */

.start-ui{
position:fixed;
bottom:30px;
left:30px;
right:30px;
display:flex;
justify-content:space-between;
z-index:10;
}

.music-btn{
padding:12px 20px;
border-radius:12px;
border:none;
background:rgba(0,0,0,.6);
color:white;
cursor:pointer;
}

.music-btn:hover{
background:#ff0000;
}

.start-btn{
padding:16px 35px;
border-radius:14px;
border:none;
background:#ff0000;
color:white;
letter-spacing:2px;
font-weight:700;
cursor:pointer;
animation:pulse 1.4s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 5px #ff0000;}
50%{box-shadow:0 0 25px #ff0000,0 0 60px rgba(255,0,0,.8);}
100%{box-shadow:0 0 5px #ff0000;}
}

/* SEMAFORO */

.start-lights{
position:fixed;
top:45%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
gap:15px;
opacity:0;
}

.light{
width:40px;
height:40px;
border-radius:50%;
background:#220000;
border:2px solid #550000;
transition:.3s;
}

.light.on{
background:red;
box-shadow:0 0 15px red,0 0 40px red;
}

.light.green{
background:#00ff6a;
box-shadow:0 0 15px #00ff6a,0 0 40px #00ff6a;
border-color:#00ff6a;
}

/* MENU */

.menu-container{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
display:flex;
gap:35px;

opacity:0;
pointer-events:none;
transition:1s;

overflow-x:auto;
overflow-y:hidden;
width:90vw;
padding:20px;

scroll-snap-type:x mandatory;
-webkit-overflow-scrolling:touch;

justify-content:flex-start;
}

.menu-container.active{
opacity:1;
pointer-events:auto;
}

.menu-container::-webkit-scrollbar{
display:none;
}

/* TARJETAS */

.menu-card{
flex:0 0 auto;
width:180px;
height:230px;
border-radius:16px;
overflow:hidden;
cursor:pointer;
transition:.4s;
scroll-snap-align:center;
}

/* IMAGENES */

.menu-card img{
width:100%;
height:100%;
object-fit:cover;
transition:.5s;
}

.menu-card:hover{
transform:scale(1.08);
box-shadow:0 0 15px red,0 0 40px rgba(255,0,0,.8);
}

.menu-card:hover img{
transform:scale(1.1);
}

/* PC CENTRADO */

@media (min-width:900px){

.menu-container{
left:0;
transform:translateY(-50%);
width:100%;
justify-content:center;
overflow-x:hidden;
}

}

/* FIA TEAM */

.fia-team{
position:fixed;
bottom:120px;
left:50%;
transform:translateX(-50%);
text-align:center;
font-size:15px;
letter-spacing:3px;
}

.fia-team div{

margin:8px 0;
opacity:0;
transform:translateY(-40px);

background:linear-gradient(90deg,#ffffff,#ff3b3b,#ffffff);
-webkit-background-clip:text;
color:transparent;

font-weight:600;

text-shadow:
0 0 6px rgba(255,0,0,.6),
0 0 20px rgba(255,0,0,.4);

animation:drop .7s forwards;
}

.fia-team div:nth-child(1){animation-delay:.4s;}
.fia-team div:nth-child(2){animation-delay:.8s;}
.fia-team div:nth-child(3){animation-delay:1.2s;}

@keyframes drop{
0%{opacity:0;transform:translateY(-40px);}
100%{opacity:1;transform:translateY(0);}
}

.fia-button{
position:fixed;
bottom:90px;
left:50%;
transform:translateX(-50%);
padding:14px 32px;
border-radius:14px;
background:rgba(0,0,0,.8);
border:1px solid rgba(255,0,0,.6);
letter-spacing:2px;
cursor:pointer;
display:none;
}

.fia-button:hover{
box-shadow:0 0 10px red,0 0 30px rgba(255,0,0,.8);
}

</style>
</head>

<body>

<video class="bg-video" autoplay muted loop playsinline>
<source src="fia.mp4" type="video/mp4">
</video>

<div class="overlay" id="overlay"></div>

<nav class="navbar">
<div class="logo">FORMULA WORLD GX</div>
</nav>

<div class="start-lights" id="lights">
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
<div class="light"></div>
</div>

<div class="start-ui">

<button class="music-btn" id="musicBtn" onclick="toggleMusic()">
MUSICA OFF
</button>

<button class="start-btn" onclick="startSequence()">
INICIAR
</button>

</div>

<div class="menu-container" id="menu">

<div class="menu-card" onclick="go('campeonatos.html')">
<img src="campeonatos.png">
</div>

<div class="menu-card" onclick="go('pilotos.html')">
<img src="pilotos.png">
</div>

<div class="menu-card" onclick="go('pistas.html')">
<img src="pistas.png">
</div>

<div class="menu-card" onclick="go('escuderias.html')">
<img src="escuderias.png">
</div>

</div>

<div class="fia-team" id="fiaTeam">
<div>Comisario FIA — Gennaro Foressi</div>
<div>Comisario FIA — Ethan Collins</div>
<div>SubComisario FIA — César Bustos</div>
</div>

<div class="fia-button" id="fiaBtn" onclick="go('fia.html')">
EQUIPO FIA
</div>

<audio id="bgMusic" src="f1mp3.mp3" loop></audio>

<script>

const music=document.getElementById("bgMusic");
const btn=document.getElementById("musicBtn");
const menu=document.getElementById("menu");
const team=document.getElementById("fiaTeam");
const fiaBtn=document.getElementById("fiaBtn");
const lights=document.getElementById("lights");
const overlay=document.getElementById("overlay");

music.volume=0.5;

document.addEventListener("click",()=>{
music.play();
btn.textContent="MUSICA ON";
},{once:true});

function toggleMusic(){

if(music.paused){
music.play();
btn.textContent="MUSICA ON";
}else{
music.pause();
btn.textContent="MUSICA OFF";
}

}

function startSequence(){

document.querySelector(".start-btn").style.display="none";
lights.style.opacity="1";

const bulbs=document.querySelectorAll(".light");

bulbs.forEach((light,i)=>{

setTimeout(()=>{
light.classList.add("on");
},i*700);

});

setTimeout(()=>{

bulbs.forEach(light=>{
light.classList.remove("on");
light.classList.add("green");
});

},3800);

setTimeout(()=>{

lights.style.opacity="0";
overlay.classList.add("active");
menu.classList.add("active");

team.style.display="none";
fiaBtn.style.display="block";

},4800);

}

function go(link){
window.location.href=link;
}

</script>

</body>
</html>
